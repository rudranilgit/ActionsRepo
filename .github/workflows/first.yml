name: First Workflow
on:
  workflow_dispatch:
jobs:
        build:
            runs-on : ubuntu-latest
            steps:
                - name: Checkout Code
                  uses: actions/checkout@v3
                - name: node setup
                  uses: actions/setup-node@v3
                  with:
                    node-version: '18'
                - name: Install dependencies
                  run: npm install
                - name: Lint Code
                  run: npm run lint
                - name: Run Tests
                  run: npm run test
                - name: Build Project
                  run: npm run build
                - name: Deploy to Production
                  run: echo "Deploying to production..."            

                


 